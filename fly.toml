# fly.toml app configuration file generated for donkeyball on 2026-04-03T00:14:33-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'donkeyball'
primary_region = 'sjc'

[build]

[env]
  DATA_FILE = '/data/data.json'
  PORT = '8080'

[[mounts]]
  source = 'donkeyball_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
